# CI placeholder — ANIKUTA build pipeline
#
# IMPORTANT: This workflow is a PLACEHOLDER. It does not build an APK yet
# because the ANIKUTA app codebase does not exist yet (Phase 0).
#
# Build policy (HARD RULE):
#   - APKs are built EXCLUSIVELY via GitHub Actions.
#   - No contributor (human or AI agent) is expected to build APKs locally.
#
# This workflow will be expanded in Phase 1 once ANIKUTA_PROJECT/ANIKUTA has
# a real Gradle project. See DOCS/06-build-and-ci.md for the plan.

name: CI (placeholder)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-sanity:
    name: Repository sanity check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify reference snapshots are present
        run: |
          test -f ANIYOMI_REFRENCE/ANIYOMI/README.md
          test -f ANIYOMI_REFRENCE/ANIYOMI/settings.gradle.kts
          echo "Aniyomi reference snapshot OK."
          test -f OLD_ANIKUTA/ANIKUTA_OLD/README.md
          test -f OLD_ANIKUTA/ANIKUTA_OLD/settings.gradle.kts
          echo "Old ANIKUTA reference snapshot OK."

      - name: Verify Aniyomi documentation is present
        run: |
          test -f ANIYOMI_REFRENCE/DOCUMENTATION/README.md
          echo "Aniyomi reference documentation OK."

      - name: Verify project skeleton is present
        run: |
          test -f ANIKUTA_PROJECT/ANIKUTA/README.md
          echo "ANIKUTA skeleton OK."

      - name: Verify required root + DOCS + RULES + new folders exist
        run: |
          for f in README.md AGENTS.md ARCHITECTURE.md \
                   DOCS/01-project-overview.md DOCS/02-target-architecture.md \
                   DOCS/03-reference-module-map.md DOCS/04-design-decisions.md \
                   DOCS/05-roadmap.md DOCS/06-build-and-ci.md \
                   RULES/ai-agent-rules.md RULES/project-conventions.md \
                   RULES/notifications.md RULES/session-handoff-template.md \
                   AGENT_CONTEXT/START_HERE.md \
                   DESIGN_LANGUAGE/README.md \
                   PLANNING/README.md; do
            test -f "$f" || { echo "MISSING: $f"; exit 1; }
          done
          test -d OLD_ANIKUTA/ANALYSIS || { echo "MISSING: OLD_ANIKUTA/ANALYSIS/"; exit 1; }
          echo "All required documentation present."

